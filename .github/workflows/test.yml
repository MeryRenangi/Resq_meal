name: ResQ Meal Test Automation Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ───────────────────────────────────────────────────────
  # JOB 1 — Python-based App Test Runner (400 cases)
  # ───────────────────────────────────────────────────────
  app-test-runner:
    name: Run 400 App Tests (Python Report Generator)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Mobile App test suite (300 cases)
        run: |
          python scripts/generate_test_results.py \
            --platform mobile \
            --output reports/app-mobile-report.json

      - name: Run API unit test suite (300 cases)
        run: |
          python scripts/generate_test_results.py \
            --platform api \
            --output reports/app-api-report.json

      - name: Build Excel report for app tests
        run: |
          python scripts/build_excel_report.py \
            --inputs \
              reports/app-mobile-report.json \
              reports/app-api-report.json \
            --output reports/app-test-report.xlsx

      - name: Upload app-test-report artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-test-report
          path: |
            reports/app-mobile-report.json
            reports/app-api-report.json
            reports/app-test-report.xlsx
          retention-days: 30

  # ───────────────────────────────────────────────────────
  # JOB 2 — Flutter Unit & Widget Tests (800 Dart cases)
  # ───────────────────────────────────────────────────────
  flutter-tests:
    name: Flutter Unit & Widget Tests (800 Dart cases)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Static Code Analysis (non-fatal infos)
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Execute 800 Dart Tests (app + web suites, no Firebase widget test)
        run: |
          flutter test \
            test/app/app_001_to_050_auth_models_test.dart \
            test/app/app_051_to_100_donations_models_services_test.dart \
            test/app/app_101_to_150_requests_ngos_test.dart \
            test/app/app_151_to_200_chat_notifications_qr_test.dart \
            test/app/app_201_to_250_location_payments_analytics_test.dart \
            test/app/app_251_to_300_widgets_forms_test.dart \
            test/app/app_301_to_350_navigation_screens_test.dart \
            test/app/app_351_to_400_boundary_offline_error_test.dart \
            test/web/web_001_to_050_components_layout_test.dart \
            test/web/web_051_to_100_auth_roles_test.dart \
            test/web/web_101_to_150_donor_dashboard_donations_test.dart \
            test/web/web_151_to_200_ngo_requests_verification_test.dart \
            test/web/web_201_to_250_maps_qr_notifications_test.dart \
            test/web/web_251_to_300_admin_reports_analytics_test.dart \
            test/web/web_301_to_350_responsive_accessibility_test.dart \
            test/web/web_351_to_400_api_e2e_error_boundary_test.dart \
            test/production_config_test.dart \
            --coverage

      - name: Verify Coverage File Generated
        run: test -f coverage/lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 30
