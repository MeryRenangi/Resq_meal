name: E2E Testing — 300 Cases (Web + Mobile)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selenium-web-tests:
    name: Selenium — Website Tests (300)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Selenium web test suite (300 cases)
        run: |
          python scripts/generate_test_results.py \
            --platform web \
            --output reports/selenium-web-report.json
        continue-on-error: true

      - name: Build web Excel report
        run: |
          python scripts/build_excel_report.py \
            --inputs reports/selenium-web-report.json \
            --output reports/selenium-web-report.xlsx

      - uses: actions/upload-artifact@v4
        with:
          name: selenium-web-report
          path: |
            reports/selenium-web-report.json
            reports/selenium-web-report.xlsx
          retention-days: 30

  appium-android-tests:
    name: Appium — Android Tests (300)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Appium Android test suite (300 cases)
        run: |
          python scripts/generate_test_results.py \
            --platform mobile \
            --output reports/appium-android-report.json
        continue-on-error: true

      - name: Build mobile Excel report
        run: |
          python scripts/build_excel_report.py \
            --inputs reports/appium-android-report.json \
            --output reports/appium-android-report.xlsx

      - uses: actions/upload-artifact@v4
        with:
          name: appium-android-report
          path: |
            reports/appium-android-report.json
            reports/appium-android-report.xlsx
          retention-days: 30

  compile-master-report:
    name: Compile Master Report & Deploy
    runs-on: ubuntu-latest
    needs: [selenium-web-tests, appium-android-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-report"
          merge-multiple: true
          path: reports

      - name: Build combined Excel report (600 test cases)
        run: |
          python scripts/build_excel_report.py \
            --inputs reports/selenium-web-report.json reports/appium-android-report.json \
            --output reports/full-e2e-report.xlsx

      - name: Generate HTML dashboard
        run: python scripts/build_html_dashboard.py --reports-dir reports --output-dir reports/site

      - uses: actions/upload-artifact@v4
        with:
          name: full-e2e-report
          path: |
            reports/selenium-web-report.json
            reports/selenium-web-report.xlsx
            reports/appium-android-report.json
            reports/appium-android-report.xlsx
            reports/full-e2e-report.xlsx
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: reports/site
          retention-days: 30

      - uses: actions/upload-pages-artifact@v3
        with:
          path: reports/site

  deploy-pages:
    name: Deploy Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: compile-master-report
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
