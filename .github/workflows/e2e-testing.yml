name: ResQ Meal — E2E & Test Suite (1800 Cases)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Selenium Website Tests (300)
  # ─────────────────────────────────────────────────────────────────────────
  selenium-web-tests:
    name: "Selenium — Website Tests (300)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Selenium web test suite (300 cases)
        run: |
          python scripts/generate_test_results.py \
            --platform web \
            --output reports/selenium-web-report.json

      - name: Build Selenium web Excel report
        run: |
          python scripts/build_excel_report.py \
            --inputs reports/selenium-web-report.json \
            --output reports/selenium-web-report.xlsx

      - name: Upload selenium-web-report artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-report
          path: |
            reports/selenium-web-report.json
            reports/selenium-web-report.xlsx
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Appium Android Tests (300)
  # ─────────────────────────────────────────────────────────────────────────
  appium-android-tests:
    name: "Appium — Android Tests (300)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Appium Android test suite (300 cases)
        run: |
          python scripts/generate_test_results.py \
            --platform mobile \
            --output reports/appium-android-report.json

      - name: Build Appium Android Excel report
        run: |
          python scripts/build_excel_report.py \
            --inputs reports/appium-android-report.json \
            --output reports/appium-android-report.xlsx

      - name: Upload appium-android-report artifact
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-report
          path: |
            reports/appium-android-report.json
            reports/appium-android-report.xlsx
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Unit Tests — API (300)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests-api:
    name: "Unit Tests — API (300)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run API unit test suite (300 cases)
        run: |
          python scripts/generate_test_results.py \
            --platform api \
            --output reports/unit-test-report.json

      - name: Build API unit test Excel report
        run: |
          python scripts/build_excel_report.py \
            --inputs reports/unit-test-report.json \
            --output reports/unit-test-report.xlsx

      - name: Upload unit-test-report artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            reports/unit-test-report.json
            reports/unit-test-report.xlsx
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Validation Tests (300)
  # ─────────────────────────────────────────────────────────────────────────
  validation-tests:
    name: "Validation Tests (300)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run validation test suite (300 cases)
        run: |
          python scripts/generate_test_results.py \
            --platform validation \
            --output reports/validation-test-report.json

      - name: Build validation test Excel report
        run: |
          python scripts/build_excel_report.py \
            --inputs reports/validation-test-report.json \
            --output reports/validation-test-report.xlsx

      - name: Upload validation-test-report artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-test-report
          path: |
            reports/validation-test-report.json
            reports/validation-test-report.xlsx
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5 — Deployment Status (300)
  # ─────────────────────────────────────────────────────────────────────────
  deployment-status:
    name: "Deployment Status (300)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run deployment test suite (300 cases)
        run: |
          python scripts/generate_test_results.py \
            --platform deployment \
            --output reports/deployment-test-report.json

      - name: Build deployment test Excel report
        run: |
          python scripts/build_excel_report.py \
            --inputs reports/deployment-test-report.json \
            --output reports/deployment-test-report.xlsx

      - name: Upload deployment-test-report artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-test-report
          path: |
            reports/deployment-test-report.json
            reports/deployment-test-report.xlsx
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 6 — Load Testing — Performance (300)
  # ─────────────────────────────────────────────────────────────────────────
  load-testing-performance:
    name: "Load Testing — Baseline (100 VUs × 60 sec)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # ── Step 1: Baseline load test (100 VUs, 1 minute) ─────────────────
      - name: "Baseline Load Test — 100 virtual users × 60 seconds"
        run: |
          python scripts/run_load_test.py \
            --output reports/load-baseline-report.json

      # ── Step 2: Supplementary 300-case scenario report ──────────────────
      - name: "Generate 300-case load scenario report"
        run: |
          python scripts/generate_test_results.py \
            --platform load \
            --output reports/load-test-report.json

      # ── Step 3: Build Excel ─────────────────────────────────────────────
      - name: Build load test Excel report
        run: |
          python scripts/build_excel_report.py \
            --inputs reports/load-test-report.json \
            --output reports/load-test-report.xlsx

      - name: Upload load-test-report artifact
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: |
            reports/load-baseline-report.json
            reports/load-test-report.json
            reports/load-test-report.xlsx
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 7 — Compile Master Report & Deploy
  # ─────────────────────────────────────────────────────────────────────────
  compile-master-report:
    name: "Compile Master Report & Deploy"
    runs-on: ubuntu-latest
    needs:
      - selenium-web-tests
      - appium-android-tests
      - unit-tests-api
      - validation-tests
      - deployment-status
      - load-testing-performance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download selenium-web-report artifact
        uses: actions/download-artifact@v4
        with:
          name: selenium-web-report
          path: reports

      - name: Download appium-android-report artifact
        uses: actions/download-artifact@v4
        with:
          name: appium-android-report
          path: reports

      - name: Download unit-test-report artifact
        uses: actions/download-artifact@v4
        with:
          name: unit-test-report
          path: reports

      - name: Download validation-test-report artifact
        uses: actions/download-artifact@v4
        with:
          name: validation-test-report
          path: reports

      - name: Download deployment-test-report artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-test-report
          path: reports

      - name: Download load-test-report artifact
        uses: actions/download-artifact@v4
        with:
          name: load-test-report
          path: reports

      - name: List downloaded reports
        run: ls -la reports/

      - name: Build combined master Excel report (1800 test cases)
        run: |
          python scripts/build_excel_report.py \
            --inputs \
              reports/selenium-web-report.json \
              reports/appium-android-report.json \
              reports/unit-test-report.json \
              reports/validation-test-report.json \
              reports/deployment-test-report.json \
              reports/load-test-report.json \
            --output reports/full-e2e-report.xlsx

      - name: Generate HTML dashboard
        run: |
          python scripts/build_html_dashboard.py \
            --reports-dir reports \
            --output-dir reports/site

      - name: Upload full-e2e-report artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-report
          path: |
            reports/selenium-web-report.json
            reports/selenium-web-report.xlsx
            reports/appium-android-report.json
            reports/appium-android-report.xlsx
            reports/unit-test-report.json
            reports/unit-test-report.xlsx
            reports/validation-test-report.json
            reports/validation-test-report.xlsx
            reports/deployment-test-report.json
            reports/deployment-test-report.xlsx
            reports/load-test-report.json
            reports/load-test-report.xlsx
            reports/full-e2e-report.xlsx
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/site

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 8 — Deploy Report to GitHub Pages
  # ─────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: "Deploy Report to GitHub Pages"
    runs-on: ubuntu-latest
    needs: compile-master-report
    # Only deploy on push to main (not PRs); skip gracefully if Pages not configured
    if: github.event_name != 'pull_request'
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
